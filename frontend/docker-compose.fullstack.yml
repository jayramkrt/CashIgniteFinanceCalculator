version: '3.9'

# Full-stack docker-compose — run from the repo root
# docker-compose up --build

services:

  postgres:
    image: postgres:16-alpine
    container_name: clearhomeemi-postgres
    environment:
      POSTGRES_DB: clearhomeemidb
      POSTGRES_USER: clearhomeemi_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearhomeemi_user -d clearhomeemidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./clearhomeemi-backend
      dockerfile: Dockerfile
    container_name: clearhomeemi-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/clearhomeemidb
      DB_USERNAME: clearhomeemi_user
      DB_PASSWORD: changeme
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./clearhomeemi-frontend
      dockerfile: Dockerfile
    container_name: clearhomeemi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

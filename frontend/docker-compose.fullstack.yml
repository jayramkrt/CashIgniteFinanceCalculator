version: '3.9'

# Full-stack docker-compose — run from the repo root
# docker-compose up --build

services:

  postgres:
    image: postgres:16-alpine
    container_name: emi-postgres
    environment:
      POSTGRES_DB: emidb
      POSTGRES_USER: emi_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emi_user -d emidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./emi-calculator-backend
      dockerfile: Dockerfile
    container_name: emi-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/emidb
      DB_USERNAME: emi_user
      DB_PASSWORD: changeme
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./emi-calculator-frontend
      dockerfile: Dockerfile
    container_name: emi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

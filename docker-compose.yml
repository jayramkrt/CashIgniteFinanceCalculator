version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clearhomeemi-postgres
    environment:
      POSTGRES_DB: clearhomeemidb
      POSTGRES_USER: clearhomeemi_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearhomeemi_user -d clearhomeemidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clearhomeemi-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/clearhomeemidb
      DB_USERNAME: clearhomeemi_user
      DB_PASSWORD: changeme
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

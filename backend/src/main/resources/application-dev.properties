# ── H2 in-memory DB for local development ────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:clearhomeemidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway disabled in dev — JPA creates schema from entities
spring.flyway.enabled=false

logging.level.com.clearhomeemi=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ── PostgreSQL (prod) — override via env vars in Docker ──────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/emidb}
spring.datasource.username=${DB_USERNAME:emi_user}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway manages schema in prod
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.com.emicalculator=INFO

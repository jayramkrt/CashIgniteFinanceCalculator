server.port=8080
server.servlet.context-path=/

# ── Tomcat hardening ──────────────────────────────────────────────────────────
server.tomcat.max-connections=2000
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=50
server.tomcat.connection-timeout=5000

# ── Request size limits ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB
server.tomcat.max-http-form-post-size=512KB

# ── Rate limiting (requests per minute per IP) ────────────────────────────────
rate-limit.capacity=60
rate-limit.refill-per-minute=60

# Stricter limit for CPU-heavy calculate endpoint
rate-limit.calculate.capacity=10
rate-limit.calculate.refill-per-minute=10

# Default profile: dev (H2 in-memory). Override with -Dspring.profiles.active=prod for production.
spring.profiles.default=dev

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=http://localhost:5173

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

logging.level.com.clearhomeemi=INFO
logging.level.org.springframework.web=INFO
